name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  build:
    name: Build (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: create-release
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=${{ github.ref_name }}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-X ztutor/internal/version.Version=${VERSION} -X ztutor/internal/version.Commit=${COMMIT} -X ztutor/internal/version.BuildDate=${DATE}"
          go build -buildvcs=false -ldflags "${LDFLAGS}" -o ztutor ./cmd/ztutor/
          go build -buildvcs=false -ldflags "${LDFLAGS}" -o ztutord ./cmd/ztutord/

      - name: Package
        run: |
          ARCHIVE=ztutor-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
          if [ "${{ matrix.goos }}" = "linux" ]; then
            tar -czf "${ARCHIVE}" ztutor ztutord ztutor.service update-ztutor.sh README.md LICENSE LICENSE-COMMERCIAL courses/c-programming
          else
            tar -czf "${ARCHIVE}" ztutor ztutord update-ztutor.sh README.md LICENSE LICENSE-COMMERCIAL courses/c-programming
          fi
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE }}
          fail_on_unmatched_files: true
