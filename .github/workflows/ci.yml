name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: golang:1.22-bookworm

    steps:
      - uses: actions/checkout@v4

      - name: Install toolchains
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            gcc g++ gdb \
            python3 \
            ruby \
            openjdk-17-jdk-headless

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: /go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Verify course manifests
        run: make manifest && git diff --exit-code -- courses/

      - name: Build
        run: make build
        env:
          COMMIT: ${{ github.sha }}
