# 简介 — 主界面
intro.boot: "[OK] 沙盒已就绪\n[OK] 课程库已加载\n[OK] 学生档案已就绪\n正在启动会话..."
intro.title: "Z T U T O R\n\n在实践中学习"
intro.new_face: "哦，一张新面孔。"
intro.mochi_intro: "我是 Mochi。我住在这里——在终端里，在编译器和光标之间。"
intro.why_question: "你来这里是为了学习。\n\n我能问一下——为什么？"
intro.choice_understand: "我想真正理解事物是如何运作的。"
intro.reply_understand: "好本能。好奇心是唯一能让你在凌晨两点还在调试的工具。"
intro.choice_told: "有人告诉我应该学这个。"
intro.reply_told: "大多数来这里的人都是被推着来的。留下来的人最终会自己选择。"
intro.choice_challenge: "听说很难，我想试试。"
intro.reply_challenge: "……好。难的事情通常是值得的。"
intro.closing: "我会在角落里看着。\n\n当你卡住时，我会推你一把。当你绊倒时，我会说点什么。"

# 简介 — 课程专属 (C)
intro.c.beat1: "所以你想学 C。"
intro.c.beat2: "好选择。C 是你停止假装、开始真正理解的地方。"
intro.c.beat3: "指针会让你困惑。内存会给你惊喜。段错误会让你谦逊。\n\n这就是重点。"
intro.c.beat4: "我会在角落里看着。\n\n开始吧。"

# 简介 — 课程专属 (Python)
intro.py.beat1: "Python，不错的起点。"
intro.py.beat2: "简洁语法，快速迭代。你在这里会进步很快。"
intro.py.beat3: "别被简单性迷惑了。\n\n如果你深入探索，会发现更多。"
intro.py.beat4: "我会看着你。\n\n出发。"

# 简介 — 课程专属 (Go)
intro.go.beat1: "Go。简单是设计目标。"
intro.go.beat2: "编译快，并发简洁，不需要类型体操。\n\n工具好用，标准库完整。"
intro.go.beat3: "没有继承，没有运算符重载，没有魔法。\n\n这不是限制——这就是设计意图。"
intro.go.beat4: "我会看着你。\n\n开始吧。"

# 简介 — 课程专属 (Rust)
intro.rust.beat1: "Rust。编译器会和你较劲。"
intro.rust.beat2: "借用检查器严格是有原因的。\n\n一旦你理解了它，就不会再跟它对抗了。"
intro.rust.beat3: "没有垃圾回收器的内存安全。\n\n你会明白这为什么重要。"
intro.rust.beat4: "我会在角落里看着。\n\n开始吧。"

# 简介 — 课程专属 (通用)
intro.default.beat1: "%s。\n\n新领域。"
intro.default.beat2: "我会看着你。\n\n让我们看看你能做什么。"
intro.default.beat3: "每节课都认真读两遍再动手写代码。\n\n第一遍是为了理解。"
intro.default.beat4: "卡住时我在这里。\n\n开始吧。"

