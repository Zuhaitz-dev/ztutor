# Intro — principal
intro.boot: "[OK] sandbox listo\n[OK] biblioteca de lecciones cargada\n[OK] perfil de estudiante listo\niniciando sesión..."
intro.title: "Z T U T O R\n\naprender haciendo"
intro.new_face: "Oh. Una cara nueva."
intro.mochi_intro: "Soy Mochi. Vivo aquí — en la terminal, entre el compilador y el cursor."
intro.why_question: "Estás aquí para aprender.\n\n¿Puedo preguntarte por qué?"
intro.choice_understand: "Quiero entender cómo funcionan las cosas de verdad."
intro.reply_understand: "Buen instinto. La curiosidad es la única herramienta que te mantiene depurando a las 2 AM."
intro.choice_told: "Alguien me dijo que debería aprender esto."
intro.reply_told: "La mayoría de los que llegan aquí fueron empujados. Los que se quedan acaban eligiéndolo."
intro.choice_challenge: "Me dijeron que era difícil. Quería intentarlo."
intro.reply_challenge: "...bien. Las cosas difíciles suelen valer la pena."
intro.closing: "Estaré en un rincón.\n\nCuando te atasques, te daré un empujón. Cuando tropieces, diré algo."

# Intro — curso específico (C)
intro.c.beat1: "Así que quieres aprender C."
intro.c.beat2: "Buena elección. C es donde dejas de fingir y empiezas a entender."
intro.c.beat3: "Los punteros te confundirán. La memoria te sorprenderá. Los segfaults te humillarán.\n\nEse es el punto."
intro.c.beat4: "Estaré vigilando desde el rincón.\n\nEmpecemos."

# Intro — curso específico (Python)
