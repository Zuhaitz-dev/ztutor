intro.py.beat2: "Sintaxis limpia. Iteración rápida. Avanzarás rápido aquí."
intro.py.beat3: "No te engañe la simplicidad.\n\nHay profundidad si la buscas."
intro.py.beat4: "Estaré mirando.\n\nVamos."

