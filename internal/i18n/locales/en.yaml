# Intro — main
intro.boot: "[OK] sandbox ready\n[OK] lesson library loaded\n[OK] student profile ready\nstarting session..."
intro.title: "Z T U T O R\n\nlearn by doing"
intro.new_face: "Oh. A new face."
intro.mochi_intro: "I'm Mochi. I live here — in the terminal, between the compiler and the cursor."
intro.why_question: "You're here to learn.\n\nCan I ask — why?"
intro.choice_understand: "I want to understand how things actually work."
intro.reply_understand: "Good instinct. Curiosity is the only tool that keeps you debugging at 2 AM."
intro.choice_told: "Someone told me I should learn this."
intro.reply_told: "Most people who end up here got pushed. The ones who stay eventually choose it."
intro.choice_challenge: "I heard it was hard. I wanted to try."
intro.reply_challenge: "...good. Hard things are usually worth it."
intro.closing: "I'll watch from the corner.\n\nWhen you get stuck, I'll nudge. When you stumble, I'll say something."

# Intro — course-specific (C)
intro.c.beat1: "So you want to learn C."
intro.c.beat2: "Good choice. C is where you stop pretending and start understanding."
intro.c.beat3: "Pointers will confuse you. Memory will surprise you. Segfaults will humble you.\n\nThat's the point."
intro.c.beat4: "I'll be watching from the corner.\n\nLet's start."

# Intro — course-specific (Python)
intro.py.beat1: "Python. Good entry point."
intro.py.beat2: "Clean syntax. Fast iteration. You'll move quickly here."
intro.py.beat3: "Don't let the simplicity fool you.\n\nThere's depth if you look for it."
intro.py.beat4: "I'll be watching.\n\nLet's go."

# Intro — course-specific (Go)
intro.go.beat1: "Go. Simple by design."
intro.go.beat2: "Fast compiles, clean concurrency, no type gymnastics.\n\nThe tools work. The standard library is complete."
intro.go.beat3: "No inheritance. No operator overloading. No magic.\n\nThat's not a limitation — it's the point."
intro.go.beat4: "I'll be watching.\n\nLet's start."

# Intro — course-specific (Rust)
intro.rust.beat1: "Rust. The compiler will push back."
intro.rust.beat2: "The borrow checker is strict for a reason.\n\nOnce you understand it, you'll stop fighting it."
intro.rust.beat3: "Memory safety without a garbage collector.\n\nYou'll see why that matters."
intro.rust.beat4: "I'll be watching from the corner.\n\nLet's start."

# Intro — course-specific (generic)
intro.default.beat1: "%s.\n\nNew territory."
intro.default.beat2: "I'll be watching.\n\nLet's see what you can do."
intro.default.beat3: "Read each lesson carefully before touching the editor.\n\nFirst pass is for understanding."
intro.default.beat4: "I'll be here when you get stuck.\n\nLet's start."

