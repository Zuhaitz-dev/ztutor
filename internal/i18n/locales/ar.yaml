# Intro — main
intro.boot: "[موافق] البيئة الافتراضية جاهزة\n[موافق] مكتبة الدروس محملة\n[موافق] ملف الطالب جاهز\nبدء الجلسة..."
intro.title: "Z T U T O R\n\nتعلم بالتطبيق"
intro.new_face: "وجه جديد."
intro.mochi_intro: "أنا موشي. أعيش هنا — في الطرفية، بين المترجم والمؤشر."
intro.why_question: "أنت هنا لتتعلم.\n\nهل يمكنني أن أسأل — لماذا؟"
intro.choice_understand: "أريد أن أفهم كيف تعمل الأشياء فعلاً."
intro.reply_understand: "غريزة جيدة. الفضول هو الأداة الوحيدة التي تُبقيك تُصحح الأخطاء في الساعة الثانية صباحاً."
intro.choice_told: "قيل لي أنني يجب أن أتعلم هذا."
intro.reply_told: "معظم من ينتهون هنا دُفعوا إلى ذلك. الذين يبقون يختارونه في نهاية المطاف."
intro.choice_challenge: "سمعت أنه صعب. أردت أن أحاول."
intro.reply_challenge: "...جيد. الأشياء الصعبة تستحق عادةً."
intro.closing: "سأراقب من الزاوية.\n\nعندما تعلق، سأنبّهك. عندما تتعثر، سأقول شيئاً."

# Intro — course-specific (C)
intro.c.beat1: "إذاً تريد أن تتعلم C."
intro.c.beat2: "خيار جيد. C هي المكان الذي تتوقف فيه عن التظاهر وتبدأ في الفهم."
intro.c.beat3: "المؤشرات ستربكك. الذاكرة ستفاجئك. أخطاء التجزئة ستُذلّك.\n\nهذا هو الهدف."
intro.c.beat4: "سأراقب من الزاوية.\n\nلنبدأ."

# Intro — course-specific (Python)
intro.py.beat1: "بايثون. نقطة بداية جيدة."
intro.py.beat2: "بنية نظيفة. تكرار سريع. ستتقدم بسرعة هنا."
intro.py.beat3: "لا تدع البساطة تخدعك.\n\nهناك عمق إن بحثت."
intro.py.beat4: "سأراقب.\n\nلنبدأ."

